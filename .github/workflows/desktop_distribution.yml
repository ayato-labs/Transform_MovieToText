name: Unified Pipeline (Test, Release, Build)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint and Pytest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv pip install --system -e .[dev,pc]

      - name: Ruff Check
        continue-on-error: true
        run: |
          ruff check src tests

      - name: Run Tests
        continue-on-error: true
        run: |
          if (!(Test-Path reports)) { New-Item -ItemType Directory -Path reports -Force }
          pytest tests/common tests/platforms/desktop tests/unit tests/integration tests/system -v --junitxml=reports/junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: reports/*

  semantic-release:
    name: Semantic Release
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-exe:
    name: Windows EXE (Unified Smart)
    needs: [lint-and-test, semantic-release]
    if: always() && (needs.lint-and-test.result == 'success') && (needs.semantic-release.result == 'success' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Build Unified EXE
        run: |
          if (Test-Path .venv) { Remove-Item -Recurse -Force .venv }
          uv venv
          uv run python scripts/build_exe.py --ci --onefile

      - name: Smoke Test
        shell: pwsh
        run: |
          $exe_path = "dist/TransformMovieToText.exe"
          echo "Starting smoke test for $exe_path"
          $proc = Start-Process -FilePath $exe_path -PassThru
          Start-Sleep -Seconds 15
          if ($proc.HasExited) {
             if ($proc.ExitCode -ne 0) {
               echo "Smoke test failed with exit code $($proc.ExitCode)"
               exit 1
             }
          } else {
             Stop-Process -Id $proc.Id -Force
             echo "Smoke test passed."
          }

      - name: Upload Windows EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/TransformMovieToText.exe

  distribute:
    name: Attach Artifacts to Release
    needs: [semantic-release, build-windows-exe]
    if: always() && (needs.build-windows-exe.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts

      - name: Debug - List Downloaded Files
        run: |
          echo "Listing all files in artifacts directory:"
          find artifacts -type f
          
      - name: Create or Update Release
        if: needs.semantic-release.outputs.new_release_git_tag != '' || startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Resolve the Target Tag
          # Priority: New release tag > Current ref tag > Latest git tag
          TAG="${{ needs.semantic-release.outputs.new_release_git_tag }}"
          if [ -z "$TAG" ] && [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          fi
          
          if [ -z "$TAG" ]; then
            echo "ERROR: No release tag found to upload to. Please create a tag or run a semantic-release first."
            exit 1
          fi
          
          echo "Targeting Release Tag: $TAG"
          
          # 2. Locate the Executable (Robust search)
          EXE_PATH=$(find artifacts -name "*.exe" | head -n 1)
          if [ -z "$EXE_PATH" ]; then
            echo "ERROR: Executable file (.exe) not found in artifacts directory!"
            find artifacts -ls || echo "Artifacts directory is empty or missing."
            exit 1
          fi
          
          echo "Found executable for upload: $EXE_PATH"
          
          # 3. Ensure Release Exists and Upload Asset
          # --if-not-exists ensures we don't fail if semantic-release already created it
          gh release create "$TAG" --generate-notes --if-not-exists
          
          # --clobber overwrites any existing asset with the same name
          gh release upload "$TAG" "$EXE_PATH" --clobber
