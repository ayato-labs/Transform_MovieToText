name: Unified Pipeline (Test, Release, Build)

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint and Pytest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv pip install --system -e .[dev,pc]

      - name: Ruff Check
        continue-on-error: true
        run: |
          ruff check src tests

      - name: Run Tests
        continue-on-error: true
        run: |
          if (!(Test-Path reports)) { New-Item -ItemType Directory -Path reports -Force }
          pytest tests/common tests/platforms/desktop tests/unit tests/integration tests/system -v --junitxml=reports/junit.xml

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: reports/*

  semantic-release:
    name: Semantic Release
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install semantic-release \
                      @semantic-release/commit-analyzer \
                      @semantic-release/release-notes-generator \
                      @semantic-release/changelog \
                      @semantic-release/git \
                      @semantic-release/exec \
                      @semantic-release/github
          npx semantic-release

  build-windows-exe-cpu:
    name: Windows EXE (CPU)
    needs: [lint-and-test, semantic-release]
    # Build if release was successful OR if we are pushing a tag/manual dispatch
    if: always() && (needs.lint-and-test.result == 'success') && (needs.semantic-release.result == 'success' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Build Windows EXE (CPU)
        run: |
          if (Test-Path .venv) { Remove-Item -Recurse -Force .venv }
          uv venv
          uv run python scripts/build_exe.py --ci --type cpu --onefile

      - name: Smoke Test (CPU)
        shell: pwsh
        run: |
          $exe_path = "dist/TransformMovieToText_CPU.exe"
          echo "Starting smoke test for $exe_path"
          $proc = Start-Process -FilePath $exe_path -PassThru
          Start-Sleep -Seconds 10
          if ($proc.HasExited) {
             if ($proc.ExitCode -ne 0) {
               echo "Smoke test failed with exit code $($proc.ExitCode)"
               exit 1
             }
          } else {
             Stop-Process -Id $proc.Id -Force
             echo "Smoke test passed."
          }

      - name: Upload Windows EXE Artifact (CPU)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-cpu
          path: dist/TransformMovieToText_CPU.exe

      - name: Release Assets (CPU)
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TransformMovieToText_CPU.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows-exe-gpu:
    name: Windows EXE (GPU)
    needs: [lint-and-test, semantic-release]
    if: always() && (needs.lint-and-test.result == 'success') && (needs.semantic-release.result == 'success' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Build Windows EXE (GPU)
        run: |
          if (Test-Path .venv) { Remove-Item -Recurse -Force .venv }
          uv venv
          uv run python scripts/build_exe.py --ci --type gpu --onefile

      - name: Smoke Test (GPU)
        shell: pwsh
        run: |
          $exe_path = "dist/TransformMovieToText_GPU.exe"
          echo "Starting smoke test for $exe_path"
          $proc = Start-Process -FilePath $exe_path -PassThru
          Start-Sleep -Seconds 15
          if ($proc.HasExited) {
             if ($proc.ExitCode -ne 0) {
               echo "Smoke test failed with exit code $($proc.ExitCode)"
               exit 1
             }
          } else {
             Stop-Process -Id $proc.Id -Force
             echo "Smoke test passed."
          }

      - name: Upload Windows EXE Artifact (GPU)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-gpu
          path: dist/TransformMovieToText_GPU.exe

      - name: Release Assets (GPU)
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TransformMovieToText_GPU.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  distribute:
    name: Attach Artifacts to Release
    needs: [semantic-release, build-windows-exe-cpu, build-windows-exe-gpu]
    if: always() && (needs.build-windows-exe-cpu.result == 'success' && needs.build-windows-exe-gpu.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: List Artifacts
        run: ls -R

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.new_release_git_tag || github.ref_name }}
          files: |
            windows-exe-cpu/TransformMovieToText-Windows-CPU.zip
            windows-exe-gpu/TransformMovieToText-Windows-GPU.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
