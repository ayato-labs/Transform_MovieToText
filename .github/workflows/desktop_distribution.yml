name: Release and Distribution

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  semantic-release:
    name: Determine Version and Create Tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      new_release_git_tag: ${{ steps.release.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm install semantic-release \
                      @semantic-release/commit-analyzer \
                      @semantic-release/release-notes-generator \
                      @semantic-release/changelog \
                      @semantic-release/git \
                      @semantic-release/exec \
                      @semantic-release/github
          npx semantic-release

  build-windows-exe-cpu:
    name: Windows EXE (CPU)
    needs: semantic-release
    if: always() && (needs.semantic-release.result == 'success' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Build Windows EXE (CPU)
        run: |
          uv run python scripts/build_exe.py --ci --type cpu

      - name: Zip Windows EXE (CPU)
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/TransformMovieToText_CPU/*" -DestinationPath "TransformMovieToText-Windows-CPU.zip"

      - name: Upload Windows EXE Artifact (CPU)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-cpu
          path: TransformMovieToText-Windows-CPU.zip

  build-windows-exe-gpu:
    name: Windows EXE (GPU)
    needs: semantic-release
    if: always() && (needs.semantic-release.result == 'success' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Build Windows EXE (GPU)
        run: |
          uv run python scripts/build_exe.py --ci --type gpu

      - name: Zip Windows EXE (GPU)
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/TransformMovieToText_GPU/*" -DestinationPath "TransformMovieToText-Windows-GPU.zip"

      - name: Upload Windows EXE Artifact (GPU)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-gpu
          path: TransformMovieToText-Windows-GPU.zip

  build-windows-flet:
    name: Windows App (Flet Thin)
    needs: semantic-release
    if: always() && (needs.semantic-release.result == 'success' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Export requirements.txt
        run: |
          uv export --format requirements-txt -o requirements.txt

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Add Flutter to path
        shell: bash
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      - name: Install Flet SDK and Core Deps
        run: |
          pip install -r requirements_thin.txt

      - name: Build Windows App (Thin)
        run: |
          uv run flet build windows --no-rich-output src/app.py

      - name: Zip Windows App
        shell: pwsh
        run: |
          Compress-Archive -Path "build/windows/*" -DestinationPath "TransformMovieToText-Windows.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: TransformMovieToText-Windows.zip

  distribute:
    name: Attach Artifacts to Release
    needs: [semantic-release, build-windows-exe-cpu, build-windows-exe-gpu, build-windows-flet]
    if: always() && (needs.semantic-release.result == 'success' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: List Artifacts
        run: ls -R

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.semantic-release.outputs.new_release_git_tag || github.ref_name }}
          files: |
            windows-binary/TransformMovieToText-Windows.zip
            windows-exe-cpu/TransformMovieToText-Windows-CPU.zip
            windows-exe-gpu/TransformMovieToText-Windows-GPU.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
