name: Desktop Distribution Build

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build-windows-exe-cpu:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Build Windows EXE (CPU)
        run: |
          uv run python scripts/build_exe.py --ci --type cpu

      - name: Zip Windows EXE (CPU)
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/TransformMovieToText/*" -DestinationPath "TransformMovieToText-Windows-CPU.zip"

      - name: Upload Windows EXE Artifact (CPU)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-cpu
          path: TransformMovieToText-Windows-CPU.zip

  build-windows-exe-gpu:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Build Windows EXE (GPU)
        run: |
          uv run python scripts/build_exe.py --ci --type gpu

      - name: Zip Windows EXE (GPU)
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/TransformMovieToText/*" -DestinationPath "TransformMovieToText-Windows-GPU.zip"

      - name: Upload Windows EXE Artifact (GPU)
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-gpu
          path: TransformMovieToText-Windows-GPU.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Export requirements.txt
        run: |
          uv export --format requirements-txt -o requirements.txt

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Add Flutter to path
        shell: bash
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      - name: Install Flet SDK and Core Deps
        run: |
          pip install -r requirements_thin.txt

      - name: Build Windows App (Thin)
        run: |
          uv run flet build windows --no-rich-output src/app.py

      - name: Zip Windows App
        shell: pwsh
        run: |
          Compress-Archive -Path "build/windows/*" -DestinationPath "TransformMovieToText-Windows.zip"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: TransformMovieToText-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          pip install uv

      - name: Export requirements.txt
        run: |
          uv export --format requirements-txt -o requirements.txt

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Add Flutter to path
        run: |
          echo "$FLUTTER_HOME/bin" >> $GITHUB_PATH

      - name: Install Flet SDK and Core Deps
        run: |
          pip install -r requirements_thin.txt

      - name: Build macOS App (Thin)
        run: |
          uv run flet build macos --no-rich-output src/app.py

      - name: Zip macOS App
        run: |
          zip -r TransformMovieToText-macOS.zip build/macos/*

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: TransformMovieToText-macOS.zip

  release:
    needs: [build-windows, build-macos, build-windows-exe-cpu, build-windows-exe-gpu]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: windows-binary

      - name: Download Windows EXE Binary (CPU)
        uses: actions/download-artifact@v4
        with:
          name: windows-exe-cpu

      - name: Download Windows EXE Binary (GPU)
        uses: actions/download-artifact@v4
        with:
          name: windows-exe-gpu

      - name: Download macOS Binary
        uses: actions/download-artifact@v4
        with:
          name: macos-binary

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            TransformMovieToText-Windows.zip
            TransformMovieToText-Windows-CPU.zip
            TransformMovieToText-Windows-GPU.zip
            TransformMovieToText-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
