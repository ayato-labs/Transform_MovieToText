name: Android Full Sync Pipeline

on:
  workflow_dispatch:

jobs:
  build-native:
    name: Build whisper.cpp Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Clone whisper.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git external/whisper.cpp

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build whisper.cpp for Android (arm64-v8a)
        run: |
          cd external/whisper.cpp
          mkdir build-android
          cd build-android
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DBUILD_SHARED_LIBS=ON \
            -DWHISPER_BUILD_EXAMPLES=OFF \
            -DWHISPER_BUILD_TESTS=OFF
          cmake --build . --config Release --target whisper -j$(nproc)

      - name: Prepare Native Artifacts
        run: |
          mkdir -p output/jniLibs/arm64-v8a
          LIB_PATH=$(find external/whisper.cpp/build-android -name "libwhisper.so" | head -n 1)
          if [ -z "$LIB_PATH" ]; then
            echo "Error: libwhisper.so not found!"
            exit 1
          fi
          cp "$LIB_PATH" output/jniLibs/arm64-v8a/

      - name: Upload Native Library
        uses: actions/upload-artifact@v4
        with:
          name: whisper-native-so
          path: output/jniLibs/
          retention-days: 1

  build-apk:
    name: Build Flet Android APK
    needs: [build-native]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Download Native Library
        uses: actions/download-artifact@v4
        with:
          name: whisper-native-so
          path: src/platforms/android/jniLibs/

      - name: Verify Native Library Placement
        run: |
          ls -R src/platforms/android/jniLibs/

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv and Flet CLI
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Flet Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          uv pip install --system flet-cli flet

      - name: Accept Android SDK Licenses
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK (Flet)
        run: |
          # Flet build expects the lib in jniLibs/arm64-v8a to be packaged
          flet build apk --yes --verbose 2>&1 | tee build_apk.log

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk-build-log
          path: build_apk.log

      - name: Upload Final APK
        uses: actions/upload-artifact@v4
        with:
          name: mtt-mobile-apk
          path: build/apk/*.apk
