[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "transform-movie-to-text"
version = "2.3.0"
description = "A UI app to extract text from video files using Whisper."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.10"
dependencies = [
    "faster-whisper",
    "google-genai",
    "flet[all]>=0.21.0",
    "flet-desktop",
    "psutil",
    "torch",
    "torchvision",
    "torchaudio",
    "ollama",
    "openai",
    "PyAudioWPatch; sys_platform == 'win32'",
    "python-dotenv",
    "pyautogui",
    "opencv-python",
    "fastembed",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-mock",
    "pytest-cov",
    "ruff",
    "python-semantic-release",
]

[tool.ruff]
line-length = 150
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "A", "C4", "T20", "RET", "SIM"] # Enforce modern, bug-free, and simple code
ignore = []

[tool.ruff.lint.per-file-ignores]
"src/app.py" = ["E402"] # Environment setup requires imports after os.environ calls

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.uv]
index = [
  { name = "pytorch", url = "https://download.pytorch.org/whl/cu121", explicit = true }
]

[tool.uv.sources]
torch = { index = "pytorch" }
torchvision = { index = "pytorch" }
torchaudio = { index = "pytorch" }

[tool.semantic_release]
version_variable = [
    "pyproject.toml:version"
]
branch = "main"
upload_to_pypi = false
upload_to_release = true
build_command = "uv build"
commit_message = "chore(release): {version} [skip ci]"
commit_parser = "angular"
logging_use_named_masks = true
major_on_zero = false
tag_format = "v{version}"
